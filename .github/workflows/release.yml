name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example v0.1.0)
        required: true
        type: string
      verify_only:
        description: Verify and publish an existing draft without rebuilding
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release
    if: ${{ !inputs.verify_only }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
          run_install: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Validate tag and signing configuration
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || {
            echo 'Missing required secret: TAURI_SIGNING_PRIVATE_KEY' >&2
            exit 1
          }
          app_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          package_version="$(node -p "require('./package.json').version")"
          cargo_version="$(sed -n '/^\[package\]/,/^\[/s/^version = "\([^"]*\)"/\1/p' src-tauri/Cargo.toml)"
          test "$RELEASE_TAG" = "v$app_version" || {
            echo "Tag $RELEASE_TAG does not match app version $app_version" >&2
            exit 1
          }
          test "$package_version" = "$app_version"
          test "$cargo_version" = "$app_version"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Test frontend
        run: pnpm test

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  publish-artifacts:
    name: Build ${{ matrix.name }}
    needs: validate
    if: ${{ always() && !inputs.verify_only && needs.validate.result == 'success' }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            args: --bundles nsis --config src-tauri/tauri.release.conf.json
            rust-targets: ''
          - name: Linux x64
            platform: ubuntu-22.04
            args: --bundles deb,appimage --config src-tauri/tauri.release.conf.json
            rust-targets: ''
          - name: macOS Universal
            platform: macos-latest
            args: --target universal-apple-darwin --bundles app,dmg --config src-tauri/tauri.release.conf.json
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
          run_install: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign, and upload release artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: OpenQuota __VERSION__
          releaseBody: |
            OpenQuota desktop release for Windows, macOS, and Linux.

            Automatic updates are cryptographically signed. Linux in-app updates are supported by the AppImage build; Debian packages update through the package installer.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
          retryAttempts: 2
          args: ${{ matrix.args }}

  publish-release:
    name: Verify and publish release
    needs: [validate, publish-artifacts]
    if: ${{ always() && (inputs.verify_only || needs.publish-artifacts.result == 'success') }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download and verify release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir release-check
          release_id="$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name == \"$RELEASE_TAG\") | .id" | head -n 1)"
          test -n "$release_id" || {
            echo "Draft release not found for $RELEASE_TAG" >&2
            exit 1
          }
          gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            > release-check/release.json
          jq -r '.assets[].name' release-check/release.json \
            > release-check/assets.txt
          jq -r '.assets[]
            | select(
                .name == "latest.json"
                or (.name | test("(-setup\\.exe|\\.AppImage|\\.deb|\\.app\\.tar\\.gz)(\\.sig)?$"))
              )
            | [.id, .name]
            | @tsv' release-check/release.json |
          while IFS=$'\t' read -r asset_id asset_name; do
            gh api "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
              -H 'Accept: application/octet-stream' \
              > "release-check/$asset_name"
          done
          node .github/scripts/normalize-updater-json.mjs \
            release-check/latest.json \
            release-check/release.json \
            "$GITHUB_REPOSITORY" \
            "$RELEASE_TAG"
          gh release upload "$RELEASE_TAG" release-check/latest.json --clobber
          node <<'NODE'
          const fs = require('node:fs');
          const update = JSON.parse(fs.readFileSync('release-check/latest.json', 'utf8'));
          const release = JSON.parse(fs.readFileSync('release-check/release.json', 'utf8'));
          const assetNames = new Set(release.assets.map((asset) => asset.name));
          const prefix = `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${encodeURIComponent(process.env.RELEASE_TAG)}/`;
          const keys = Object.keys(update.platforms ?? {});
          for (const prefix of ['windows-', 'linux-', 'darwin-']) {
            if (!keys.some((key) => key.startsWith(prefix))) {
              throw new Error(`latest.json is missing a ${prefix} platform: ${keys.join(', ')}`);
            }
          }
          for (const [platform, entry] of Object.entries(update.platforms)) {
            if (!entry.url || !entry.signature) {
              throw new Error(`Incomplete updater entry: ${platform}`);
            }
            if (!entry.url.startsWith(prefix)) {
              throw new Error(`Updater URL is not a public release download for ${platform}: ${entry.url}`);
            }
            const asset = decodeURIComponent(entry.url.slice(prefix.length));
            if (!assetNames.has(asset)) {
              throw new Error(`Unknown updater asset for ${platform}: ${entry.url}`);
            }
            const publishedSignature = fs
              .readFileSync(`release-check/${asset}.sig`, 'utf8')
              .trim();
            if (publishedSignature !== entry.signature.trim()) {
              throw new Error(`latest.json signature mismatch for ${platform}`);
            }
          }
          NODE
          grep -Eiq '\.exe$' release-check/assets.txt
          grep -Eiq '\.AppImage$' release-check/assets.txt
          grep -Eiq '\.deb$' release-check/assets.txt
          grep -Eiq '\.dmg$' release-check/assets.txt
          grep -Eiq '\.sig$' release-check/assets.txt
          grep -Fxq 'latest.json' release-check/assets.txt

      - name: Verify updater signatures with the bundled public key
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/minisign.tar.gz \
            https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-linux.tar.gz
          echo '9a599b48ba6eb7b1e80f12f36b94ceca7c00b7a5173c95c3efc88d9822957e73  /tmp/minisign.tar.gz' \
            | sha256sum --check --strict
          tar --extract --gzip --file /tmp/minisign.tar.gz --directory /tmp \
            minisign-linux/x86_64/minisign
          sudo install -m 0755 /tmp/minisign-linux/x86_64/minisign \
            /usr/local/bin/minisign
          node <<'NODE'
          const fs = require('node:fs');
          const config = require('./src-tauri/tauri.conf.json');
          const encoded = config.plugins?.updater?.pubkey;
          if (!encoded) throw new Error('Missing updater public key');
          fs.writeFileSync('release-check/updater-public.key', Buffer.from(encoded, 'base64'));
          NODE
          verified=0
          for signature in release-check/*.sig; do
            artifact="${signature%.sig}"
            test -f "$artifact"
            base64 --decode "$signature" > "$signature.minisig"
            minisign -Vm "$artifact" \
              -p release-check/updater-public.key \
              -x "$signature.minisig"
            verified=$((verified + 1))
          done
          test "$verified" -eq 4

      - name: Publish verified release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id="$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name == \"$RELEASE_TAG\") | .id" | head -n 1)"
          test -n "$release_id"
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -F draft=false \
            -f make_latest=true

      - name: Verify public updater downloads
        run: |
          urls="$(jq -r '.platforms[].url' release-check/latest.json | sort -u)"
          while IFS= read -r url; do
            downloaded=false
            for attempt in 1 2 3 4 5; do
              if curl --fail --location --silent --show-error \
                --range 0-0 --output /dev/null "$url"; then
                downloaded=true
                break
              fi
              echo "Public download is not ready yet (attempt $attempt/5): $url"
              sleep 3
            done
            test "$downloaded" = true
          done <<< "$urls"
